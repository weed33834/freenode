<!-- 可复用 Section 标题
     参数:
       title:    主标题 (中文)
       meta:     右侧小字 (可选)
       link:     右侧链接 URL (可选)
       link_text: 右侧链接文字 (可选)
-->
<h2 class="section-title">
  <span class="section-title-left">
    <span class="section-title-text">{{ include.title }}</span>
    {% if include.meta %}<span class="meta">{{ include.meta }}</span>{% endif %}
  </span>
  {% if include.link %}
  <span class="meta"><a href="{{ include.link }}">{{ include.link_text | default: '查看全部 →' }}</a></span>
  {% endif %}
</h2>
