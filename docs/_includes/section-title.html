<!-- Reusable section title
     Params:
       title:     main title (English)
       meta:      right-side small text (optional)
       link:      right-side link URL (optional)
       link_text: right-side link text (optional)
-->
<h2 class="section-title">
  <span class="section-title-left">
    <span class="section-title-text">{{ include.title }}</span>
    {% if include.meta %}<span class="meta">{{ include.meta }}</span>{% endif %}
  </span>
  {% if include.link %}
  <span class="meta"><a href="{{ include.link }}">{{ include.link_text | default: 'View all →' }}</a></span>
  {% endif %}
</h2>
