<!-- 可复用 stat 卡片
     参数:
       tone:    颜色 tone (cyan/green/purple/pink)
       label:   标签文本
       value:   数值
       unit:    单位 (可选)
       decimal: 小数位 (可选, 默认 0)
       trend:   趋势文本 (可选, 如 "↑ 100% 存活率")
       trend_class: 趋势颜色 class (up/down)
-->
<div class="stat-card" data-tone="{{ include.tone }}">
  <div class="stat-label">{{ include.label }}</div>
  <div class="stat-value">
    <span data-countup="{{ include.value }}" data-decimal="{{ include.decimal | default: 0 }}">0</span>
    {% if include.unit %}<span class="stat-unit">{{ include.unit }}</span>{% endif %}
  </div>
  {% if include.trend %}
  <div class="stat-trend {{ include.trend_class | default: 'up' }}">{{ include.trend }}</div>
  {% endif %}
</div>
