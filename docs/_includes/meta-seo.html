<!-- SEO meta: Open Graph + Twitter Card + structured data -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:locale" content="en">
<meta property="og:locale:alternate" content="zh_CN">
<meta property="og:locale:alternate" content="ja_JP">
{% if site.data.site %}
<meta property="og:url" content="{{ site.data.site.pages_url }}">
<meta property="og:image" content="{{ site.data.site.pages_url | append: '/assets/img/og.png' }}">
{% endif %}
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
{% if site.data.site %}
<meta name="twitter:image" content="{{ site.data.site.pages_url | append: '/assets/img/og.png' }}">
{% endif %}

<!-- JSON-LD structured data for richer search results -->
{% if site.data.site %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ site.title }}",
  "url": "{{ site.data.site.pages_url }}",
  "description": "{{ page.description | default: site.description | escape }}",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "{{ site.data.site.pages_url }}?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>
{% endif %}
