# Jekyll config — FreeNode navigation site
# Auto-built by GitHub Pages, no CI build step required

title: FreeNode
description: "FreeNode — open-source free public proxy / node subscription source aggregator. Crawls 80+ community sources, verifies reachability, outputs Clash / V2Ray / proxy list subscriptions on GitHub Pages."
url: "https://weed33834.github.io"
baseurl: "/freenode"
repository: weed33834/freenode
author: FreeNode Contributors
lang: en
timezone: UTC

# Theme: pure custom layout (no theme dependency, custom CSS overrides)
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Exclude build artifacts & script dirs
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - README.zh-CN.md
  - README.ja.md

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Custom data files (generated by scripts/site_builder.py)
# Access via site.data.subscriptions / site.data.stats / site.data.sources / site.data.protocols

# GitHub Pages metadata
github: [metadata]
