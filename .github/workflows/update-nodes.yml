name: Update Nodes

# ⚠️ 自动调度已停用：节点更新改为人工触发（“自己来部署”）。
# 需要更新节点时，在 Actions 页面手动 Run workflow，或在本地跑 `python3 scripts/update.py`。
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "update-nodes"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Run update script
        env:
          FREENODE_VERIFY_NODES: "true"
          FREENODE_GEO_ENABLED: "false"
          FREENODE_MAX_NODES: "800"
          FREENODE_MAX_PROXIES: "300"
          # 大文件源单次抓取超时（秒），避免一个慢源拖垮整个流水线
          FREENODE_FETCH_TIMEOUT: "25"
          # 单源最大重试次数
          FREENODE_FETCH_RETRIES: "2"
        run: python3 scripts/update.py --verify

      - name: Validate generated files
        run: |
          set -e
          for f in nodes/clash.yaml nodes/v2ray.txt nodes/proxies.txt nodes/regions.json; do
            if [ ! -s "$f" ]; then
              echo "ERROR: $f is missing or empty" >&2
              exit 1
            fi
          done
          echo "Generated node/proxy files are non-empty."

      - name: Run tests
        run: make test

      - name: Commit and push changes to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily node update"
            git push
          fi
