name: Manual Update & PR

# No more scheduled triggers — keeps the bot from polluting main history & branches.
# The user manually clicks "Run workflow" on the GitHub Actions page; on completion
# a PR is auto-created. After review & Merge, main always reflects human-approved commits.
#
# Triple PR-pileup guard:
# 1. Fixed branch name auto/pending-update (no timestamp suffix)
# 2. Auto-close stale PRs on the same branch before creating a new one
# 3. Concurrency group serializes runs to avoid concurrent triggers
on:
  workflow_dispatch:
    inputs:
      verify_nodes:
        description: 'Verify node reachability (slower but higher-quality nodes)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      verify_level:
        description: 'Verify level: tcp (TCP connect only, fast) / protocol (TCP + protocol handshake, slower but more accurate)'
        required: false
        default: 'tcp'
        type: choice
        options: ['tcp', 'protocol']

permissions:
  contents: write        # push to the PR branch
  pull-requests: write   # create / close PRs

concurrency:
  group: manual-update
  cancel-in-progress: false  # never cancel a running job — avoids half-baked PRs

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          FREENODE_VERIFY_NODES: ${{ inputs.verify_nodes }}
          FREENODE_VERIFY_TIMEOUT: '5'
          FREENODE_VERIFY_WORKERS: '50'
          FREENODE_VERIFY_LEVEL: ${{ inputs.verify_level }}
          FREENODE_VERIFY_CAP: '2500'   # pre-truncate node spikes so 5000+ verifications don't blow up the runtime
          FREENODE_MAX_NODES: '800'
          FREENODE_MAX_PROXIES: '300'
          FREENODE_ARCHIVE_RETENTION: '30'
        run: python scripts/update.py ${{ inputs.verify_nodes == 'true' && '--verify' || '' }}

      - name: Build site data
        run: python scripts/site_builder.py

      - name: Setup Ruby for Jekyll
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install Jekyll
        run: gem install jekyll --no-document

      - name: Verify Jekyll build
        # Critical gate: run jekyll build BEFORE creating the PR to validate Liquid template syntax.
        # If _data JSON is corrupted or HTML is broken, this step fails and aborts the workflow —
        # no half-baked PR will be created.
        run: |
          cd docs
          # Remove Gemfile (GitHub Pages uses github-pages gem; local uses plain jekyll)
          mv Gemfile Gemfile.bak 2>/dev/null || true
          jekyll build --destination ../_site_preview --trace
          mv Gemfile.bak Gemfile 2>/dev/null || true
          echo "✅ Jekyll build passed"

      - name: Close stale PRs
        # Before creating a new PR, auto-close existing open PRs on the same branch (prevents pileup)
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:auto/pending-update`,
            });
            for (const pr of pulls) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: 'closed',
              });
              core.info(`Closed stale PR #${pr.number}`);
            }

      - name: Create PR
        # Use peter-evans/create-pull-request with a fixed branch auto/pending-update
        # (no branch-suffix: timestamp — avoids spawning a new branch every run)
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: manual node update $(date -u +%Y-%m-%d)

            - Run update.py pipeline (crawler/parser/dedup/verifier/formatter)
            - Run site_builder.py to generate docs/_data/*.json
            - Run jekyll build to verify template syntax passes
            - Manually triggered; awaiting human review & merge
          branch: auto/pending-update
          delete-branch: true
          title: 'chore: node update $(date -u +%Y-%m-%d)'
          body: |
            ## This update

            Manually triggered via GitHub Actions; awaiting owner review.

            ### Changes
            - `nodes/*.json` node data (quality / clash / v2ray / proxies / sources-report)
            - `nodes/archive/YYYY-MMDD/` data snapshot (30-day retention, for rollback)
            - `docs/_data/*.json` site data JSON
            - May include `config/sources.json` status field promotions/demotions (gradual onboarding)

            ### Verification checklist
            - [x] jekyll build passed (template syntax OK)
            - [ ] Check `nodes/quality.json` `summary.survival_rate` is reasonable (>50%)
            - [ ] Check `nodes/sources-report.json` `promotion_log` for abnormal promotions/demotions
            - [ ] After deploy, visit https://weed33834.github.io/freenode/ to confirm data

            ### After merge
            Merging to main triggers an automatic GitHub Pages deploy; the site refreshes within 1-2 minutes.

            ### Rollback
            If data looks wrong after merge, restore the last good snapshot from `nodes/archive/YYYY-MMDD/`.
          labels: |
            automated-update
            data-only
          assignees: weed33834
          reviewers: weed33834
