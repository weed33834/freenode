name: Stale

# 自动关停长时间无活动的 Issue / PR，避免列表堆积。

on:
  schedule:
    - cron: '30 2 * * *'  # 每天 02:30 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: stale
  cancel-in-progress: false

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          # Issue：60 天无活动标记 stale，再 14 天关闭
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: |
            这个 Issue 已经 60 天没有活动了，标记为 stale。如果在 14 天内没有新的回复或活动，将被自动关闭。如需继续讨论，请添加评论或去掉 stale 标签。
          close-issue-message: |
            这个 Issue 因长时间无活动被自动关闭。如问题仍然存在，请重新打开或新建 Issue 并附上最新信息。
          # PR：90 天无活动标记 stale，再 30 天关闭（PR 周期更长）
          days-before-pr-stale: 90
          days-before-pr-close: 30
          stale-pr-label: stale
          stale-pr-message: |
            这个 PR 已经 90 天没有活动了，标记为 stale。如果在 30 天内没有新的提交或回复，将被自动关闭。如仍在推进，请添加评论或去掉 stale 标签。
          close-pr-message: |
            这个 PR 因长时间无活动被自动关闭。如仍需合并，请重新打开并 rebase 到最新 main。
          # 带 pinned / security / 数据源报告 标签的不处理
          exempt-issue-labels: pinned,security,keep-alive
          exempt-pr-labels: pinned,security,keep-alive
          operations-per-run: 30
