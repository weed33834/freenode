name: Auto-merge bot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]' || github.actor == 'github-actions[bot]' || github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for bot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          # Enable auto-merge with squash strategy via GraphQL API
          PR_ID=$(curl -s -H "Authorization: bearer $GH_TOKEN" \
            -X POST https://api.github.com/graphql \
            -d "{\"query\": \"query { repository(owner: \\\"${REPO%/*}\\\", name: \\\"${REPO#*/}\\\") { pullRequest(number: $PR_NUMBER) { id } } }\"}" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['repository']['pullRequest']['id'])")
          curl -s -H "Authorization: bearer $GH_TOKEN" \
            -X POST https://api.github.com/graphql \
            -d "{\"query\": \"mutation { enablePullRequestAutoMerge(input: {pullRequestId: \\\"$PR_ID\\\", mergeMethod: SQUASH}) { pullRequest { number } } }\"}"
          echo "Auto-merge enabled for PR #$PR_NUMBER"
