name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            backend/requirements.txt

      - name: Install dependencies
        run: |
          pip3 install -r requirements.txt
          pip3 install -r backend/requirements.txt

      - name: Lint Python
        run: make lint

      - name: Run scripts tests
        run: make test

      - name: Run backend tests
        run: |
          mkdir -p backend/data
          make test-backend

      - name: Run update pipeline (without verification)
        run: python3 scripts/update.py --no-verify

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install dependencies
        working-directory: ./web
        run: npm ci

      - name: Lint web
        working-directory: ./web
        run: npm run lint

      - name: Build web
        working-directory: ./web
        run: npm run build
