name: Source Health Check

# ⚠️ 自动触发已停用：数据源健康检查改为人工运行（“自己来”）。
# 在 Actions 页面手动 Run workflow 检查连续失败的源并开/关 issue。

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: "source-check"
  cancel-in-progress: false

jobs:
  report-failing-sources:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check sources-report.json
        id: check
        run: |
          set -e
          REPORT="nodes/sources-report.json"
          if [ ! -f "$REPORT" ]; then
            echo "report missing; skipping"
            echo "has_report=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_report=true" >> "$GITHUB_OUTPUT"
          # 用 python 解析：找出连续失败 >=3 天的源
          python3 - <<'PY' > failing_sources.txt
          import json, sys
          from datetime import datetime, timezone
          data = json.load(open("nodes/sources-report.json", encoding="utf-8"))
          history = data.get("history", [])
          if not history:
              sys.exit(0)
          # 按源名聚合最近连续失败天数
          names = list(data.get("reliability_score", {}).keys())
          today = history[-1]["sources"]
          for entry in today:
              if entry["status"] != "failed":
                  continue
              name = entry["name"]
              # 从最新一天往回数连续失败天数
              streak = 0
              for h in reversed(history):
                  match = next((s for s in h["sources"] if s["name"] == name), None)
                  if not match:
                      break
                  if match["status"] == "failed":
                      streak += 1
                  else:
                      break
              if streak >= 3:
                  print(f"{name}\t{entry['category']}\t{streak}")
          PY
          if [ -s failing_sources.txt ]; then
            echo "failing sources:"
            cat failing_sources.txt
            echo "has_failing=true" >> "$GITHUB_OUTPUT"
          else
            echo "no sources failing 3+ days in a row"
            echo "has_failing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open / update issues for failing sources
        if: ${{ steps.check.outputs.has_report == 'true' && steps.check.outputs.has_failing == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          while IFS=$'\t' read -r name category streak; do
            [ -z "$name" ] && continue
            title="Source failing: ${name}"
            # 用 label 区分自动 issue，避免误关人工 issue
            label="auto-source-health"
            body=$(cat <<EOF
          ## Data source health alert

          The data source \`${name}\` (category: \`${category}\`) has failed to fetch for **${streak} consecutive days**.

          This issue was opened automatically by the \`source-check\` workflow based on \`nodes/sources-report.json\`.

          ### What to check
          - The source URL is still reachable
          - The source page layout has not changed
          - The source has not been removed from \`config/sources.json\`

          ### Resolution
          Once the source is fixed or removed, this issue will auto-close on the next successful run.
          EOF
            )
            # 查找已存在的同名 open issue
            existing=$(gh issue list --repo "$REPO" --state open --label "$label" \
                       --search "in:title ${title}" --json number,title --jq ".[] | select(.title==\"${title}\") | .number")
            if [ -n "$existing" ]; then
              # 已有 issue：追加一条更新评论
              gh issue comment "$existing" --repo "$REPO" --body "Still failing as of latest run (streak: ${streak} days)."
            else
              # 新开 issue
              gh issue create --repo "$REPO" --title "$title" --body "$body" --label "$label"
            fi
          done < failing_sources.txt

      - name: Auto-close recovered sources
        if: ${{ steps.check.outputs.has_report == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          REPORT="nodes/sources-report.json"
          # 收集今天成功的源名
          python3 - <<'PY' > recovered.txt
          import json
          data = json.load(open("nodes/sources-report.json", encoding="utf-8"))
          history = data.get("history", [])
          if not history:
              exit(0)
          for entry in history[-1]["sources"]:
              if entry["status"] == "success":
                  print(entry["name"])
          PY
          while read -r name; do
            [ -z "$name" ] && continue
            title="Source failing: ${name}"
            existing=$(gh issue list --repo "$REPO" --state open --label "auto-source-health" \
                       --json number,title --jq ".[] | select(.title==\"${title}\") | .number")
            if [ -n "$existing" ]; then
              gh issue comment "$existing" --repo "$REPO" \
                --body "Source \`${name}\` recovered on the latest run. Closing automatically."
              gh issue close "$existing" --repo "$REPO"
            fi
          done < recovered.txt
