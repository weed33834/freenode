name: Feature request
description: Propose a new feature, improvement, or data source
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Related problem
      description: Describe the problem or limitation you're hitting. If you just want to add a data source, skip to "Source info".
      placeholder: "I can't filter nodes by region, so the Clash config gets too large."
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like the project to implement this.
      placeholder: "Add a region filter param to formatter so nodes can be exported by ISO country code."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe other solutions or workarounds you've considered.
    validations:
      required: false

  - type: textarea
    id: source_info
    attributes:
      label: Source info (if applicable)
      description: If this is a new data source proposal, fill in the following.
      placeholder: |
        - Name:
        - URL:
        - Protocol: vmess / vless / ss / trojan / http / socks5
        - Update frequency:
        - Access notes:
        - Base64 encoded:
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, links, or anything else that helps explain.
    validations:
      required: false
