# Only ruff / pytest / mypy config kept here. Packaging & backend config removed.

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "SIM", "B"]
ignore = [
    "E501",   # line length is handled by the formatter
    "E402",   # sys.path.insert before import is common in tests
    "B011",   # assert False placeholder in tests
    "UP046",  # PEP 695 generics not enforced
]

[tool.ruff.lint.isort]
known-first-party = ["utils"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
pythonpath = ["scripts"]
addopts = ["-q", "--strict-markers"]
asyncio_mode = "auto"
filterwarnings = ["ignore::DeprecationWarning", "ignore::PendingDeprecationWarning"]

[tool.mypy]
python_version = "3.12"
warn_unused_ignores = true
warn_redundant_casts = true
ignore_missing_imports = true

[tool.coverage.run]
source = ["scripts"]
branch = true
omit = ["*/tests/*"]

[tool.coverage.report]
show_missing = true
