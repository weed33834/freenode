# 仅保留 ruff / pytest / mypy 配置，去掉了原仓库的打包与后端配置。

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "SIM", "B"]
ignore = [
    "E501",   # 行长由 formatter 管
    "E402",   # 测试里 sys.path.insert 后 import 是常见模式
    "B011",   # 测试里 assert False 占位
    "UP046",  # PEP 695 泛型不强制
]

[tool.ruff.lint.isort]
known-first-party = ["utils"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
pythonpath = ["scripts"]
addopts = ["-q", "--strict-markers"]
asyncio_mode = "auto"
filterwarnings = ["ignore::DeprecationWarning", "ignore::PendingDeprecationWarning"]

[tool.mypy]
python_version = "3.12"
warn_unused_ignores = true
warn_redundant_casts = true
ignore_missing_imports = true

[tool.coverage.run]
source = ["scripts"]
branch = true
omit = ["*/tests/*"]

[tool.coverage.report]
show_missing = true
